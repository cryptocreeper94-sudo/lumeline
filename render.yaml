services:
  - type: web
    name: lumeline
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
