services:
  - type: web
    name: lumeline
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lumeline-db
          property: connectionString
      - key: ODDS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: lumeline-db
    plan: free
    databaseName: lumeline
